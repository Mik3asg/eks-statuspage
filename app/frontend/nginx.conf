# nginx config for the frontend container
# What:  Serves the static Vite build and proxies API + WebSocket calls to the backend
# Why:   React is a SPA — nginx handles routing, avoids CORS, and upgrades WS connections

server {
  listen 80;

  # Serve the Vite build — fallback to index.html for client-side routing
  root /usr/share/nginx/html;
  index index.html;
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy REST API calls to the backend
  location /api/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
  }

  # Proxy WebSocket — must upgrade the HTTP connection
  location /ws {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
  }
}
