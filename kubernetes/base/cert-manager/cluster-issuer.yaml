# ClusterIssuer — tells CertManager to use Let's Encrypt with HTTP01 challenge
# HTTP01: Let's Encrypt verifies domain ownership by hitting a temporary endpoint on your ingress
# Apply after CertManager is installed: kubectl apply -f kubernetes/base/cert-manager/
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: mickael.devops@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: nginx
