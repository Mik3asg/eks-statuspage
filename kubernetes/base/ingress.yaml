# Ingress — routes external traffic to frontend and backend services
# NGINX handles routing, CertManager issues the TLS cert, ExternalDNS creates the DNS record
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: statuspage
  namespace: production
  annotations:
    # NGINX — use the nginx ingress class installed via Helm
    kubernetes.io/ingress.class: nginx
    # CertManager — automatically issue a Let's Encrypt certificate for this host
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # ExternalDNS — automatically create eks.virtualscale.dev in Cloudflare
    external-dns.alpha.kubernetes.io/hostname: eks.virtualscale.dev
spec:
  tls:
    - hosts:
        - eks.virtualscale.dev
      secretName: statuspage-tls

  rules:
    - host: eks.virtualscale.dev
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
