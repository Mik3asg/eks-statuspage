apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # Image is replaced by CI/CD pipeline at deploy time
          image: 207137402976.dkr.ecr.eu-west-2.amazonaws.com/eks-statuspage/frontend:sha-bd2aac4bba813a79159b1be76d4564ffe956b0e1
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
