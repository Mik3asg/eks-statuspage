# ArgoCD Application — defines what to deploy and where to sync from
# Apply after ArgoCD is installed: kubectl apply -f kubernetes/base/argocd/
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eks-statuspage
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Mik3asg/eks-statuspage
    targetRevision: main
    path: kubernetes/base

  destination:
    server: https://kubernetes.default.svc
    namespace: production

  syncPolicy:
    automated:
      prune: true     # delete resources removed from Git
      selfHeal: true  # revert manual changes made directly to the cluster
    syncOptions:
      - CreateNamespace=true
