# DB credentials — in production replace with AWS Secrets Manager + External Secrets Operator
# stringData accepts plain text — Kubernetes encodes it automatically
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: production
type: Opaque
stringData:
  DB_HOST:     postgres
  DB_PORT:     "5432"
  DB_NAME:     statuspage
  DB_USER:     postgres
  DB_PASSWORD:  changeme
