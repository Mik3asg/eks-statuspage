# Prometheus + Grafana — Helm values (kube-prometheus-stack)
#
# What:  Deploys Prometheus (metrics collection) + Grafana (dashboards) in one chart
# Why:   Single install gives full cluster observability — nodes, pods, ingress traffic
#
# Install (run after EKS context is set):
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm install monitoring prometheus-community/kube-prometheus-stack \
#     --namespace monitoring --create-namespace \
#     -f kubernetes/helm/monitoring/values.yaml
#
# Default Grafana login — change password after first login:
#   user: admin / password: see grafana.adminPassword below

prometheus:
  prometheusSpec:
    retention: 15d

grafana:
  adminPassword: changeme

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.virtualscale.dev
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.virtualscale.dev

  # Pre-built dashboards for cluster health
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          folder: ""
          type: file
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      # Node metrics — CPU, memory, disk per node
      node-exporter:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
      # Pod and namespace metrics
      kubernetes-pods:
        gnetId: 6781
        revision: 1
        datasource: Prometheus
      # NGINX ingress traffic metrics
      nginx-ingress:
        gnetId: 9614
        revision: 1
        datasource: Prometheus
