# ArgoCD — Helm values
#
# What:  GitOps controller — watches the Git repo and syncs cluster state to match
# Why:   No manual kubectl apply needed — push to Git, ArgoCD deploys automatically
#
# Install (run after EKS context is set):
#   helm repo add argo https://argoproj.github.io/argo-helm
#   helm repo update
#   helm install argocd argo/argo-cd \
#     --namespace argocd --create-namespace \
#     -f kubernetes/helm/argocd/values.yaml
#
# Get initial admin password after install:
#   kubectl -n argocd get secret argocd-initial-admin-secret \
#     -o jsonpath="{.data.password}" | base64 -d

server:
  # Expose ArgoCD UI via the NGINX ingress
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - argocd.virtualscale.dev
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    tls:
      - secretName: argocd-tls
        hosts:
          - argocd.virtualscale.dev
